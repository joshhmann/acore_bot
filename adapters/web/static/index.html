<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestalt Framework - Chat</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .chat-container {
            width: 100%;
            max-width: 800px;
            height: 90vh;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            text-align: center;
        }
        
        .header h1 {
            font-size: 24px;
            margin-bottom: 5px;
        }
        
        .header p {
            opacity: 0.9;
            font-size: 14px;
        }
        
        .controls {
            padding: 15px 20px;
            background: #f8f9fa;
            border-bottom: 1px solid #e9ecef;
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }
        
        .controls label {
            font-weight: 600;
            color: #495057;
            font-size: 14px;
        }
        
        .controls select, .controls input {
            padding: 8px 12px;
            border: 1px solid #ced4da;
            border-radius: 8px;
            font-size: 14px;
            background: white;
        }
        
        .controls select {
            min-width: 150px;
        }
        
        .controls input {
            flex: 1;
            min-width: 200px;
        }
        
        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        
        .message {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 18px;
            line-height: 1.5;
            animation: fadeIn 0.3s ease;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .message.user {
            align-self: flex-end;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-bottom-right-radius: 4px;
        }
        
        .message.bot {
            align-self: flex-start;
            background: #f1f3f4;
            color: #333;
            border-bottom-left-radius: 4px;
        }
        
        .message .author {
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 4px;
            opacity: 0.8;
        }
        
        .input-area {
            padding: 20px;
            background: #f8f9fa;
            border-top: 1px solid #e9ecef;
            display: flex;
            gap: 10px;
        }
        
        .input-area input {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid #ced4da;
            border-radius: 25px;
            font-size: 16px;
            outline: none;
            transition: border-color 0.2s;
        }
        
        .input-area input:focus {
            border-color: #667eea;
        }
        
        .input-area button {
            padding: 12px 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 25px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        .input-area button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }
        
        .input-area button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        
        .typing {
            align-self: flex-start;
            background: #f1f3f4;
            padding: 12px 16px;
            border-radius: 18px;
            color: #666;
            font-style: italic;
            display: none;
        }
        
        .typing.visible {
            display: block;
        }
        
        .error {
            background: #fee;
            color: #c33;
            padding: 10px;
            border-radius: 8px;
            margin: 10px 20px;
            font-size: 14px;
            display: none;
        }
        
        .error.visible {
            display: block;
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="header">
            <h1>🎭 Gestalt Framework</h1>
            <p>Chat with AI Personas</p>
        </div>
        
        <div class="controls">
            <label for="persona">Persona:</label>
            <select id="persona">
                <option value="dagoth_ur">Dagoth Ur</option>
                <option value="scav">Scav</option>
                <option value="zenos">Zenos</option>
                <option value="maury">Maury</option>
                <option value="hal9000">HAL 9000</option>
                <option value="toad">Toad</option>
            </select>
            
            <label for="userId">User ID:</label>
            <input type="text" id="userId" placeholder="web_user" value="web_user">
        </div>
        
        <div class="error" id="error"></div>
        
        <div class="messages" id="messages">
            <div class="message bot">
                <div class="author">System</div>
                Welcome to Gestalt Framework! Select a persona and start chatting.
            </div>
        </div>
        
        <div class="typing" id="typing">Persona is typing...</div>
        
        <div class="input-area">
            <input type="text" id="messageInput" placeholder="Type your message..." maxlength="1000">
            <button id="sendBtn" onclick="sendMessage()">Send</button>
        </div>
    </div>

    <script>
        const messagesDiv = document.getElementById('messages');
        const messageInput = document.getElementById('messageInput');
        const personaSelect = document.getElementById('persona');
        const userIdInput = document.getElementById('userId');
        const typingDiv = document.getElementById('typing');
        const errorDiv = document.getElementById('error');
        const sendBtn = document.getElementById('sendBtn');
        
        let isProcessing = false;
        
        // Load personas on startup
        async function loadPersonas() {
            try {
                const response = await fetch('/personas');
                const data = await response.json();
                
                if (data.personas && data.personas.length > 0) {
                    personaSelect.innerHTML = data.personas.map(p => 
                        `<option value="${p.id}">${p.display_name}</option>`
                    ).join('');
                }
            } catch (e) {
                console.log('Using default personas');
            }
        }
        
        function addMessage(text, isUser, author = '') {
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${isUser ? 'user' : 'bot'}`;
            if (author) {
                msgDiv.innerHTML = `<div class="author">${author}</div>${text}`;
            } else {
                msgDiv.textContent = text;
            }
            messagesDiv.appendChild(msgDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }
        
        function showError(msg) {
            errorDiv.textContent = msg;
            errorDiv.classList.add('visible');
            setTimeout(() => errorDiv.classList.remove('visible'), 5000);
        }
        
        async function sendMessage() {
            const text = messageInput.value.trim();
            if (!text || isProcessing) return;
            
            isProcessing = true;
            sendBtn.disabled = true;
            messageInput.value = '';
            
            addMessage(text, true, userIdInput.value);
            typingDiv.classList.add('visible');
            
            try {
                const response = await fetch('/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        message: text,
                        persona_id: personaSelect.value,
                        user_id: userIdInput.value,
                        channel_id: 'web_chat'
                    })
                });
                
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                
                const data = await response.json();
                addMessage(data.response, false, data.persona_name);
                
            } catch (error) {
                console.error('Error:', error);
                showError('Failed to get response. Is the server running?');
                addMessage('Error: Could not get response', false, 'System');
            } finally {
                isProcessing = false;
                sendBtn.disabled = false;
                typingDiv.classList.remove('visible');
                messageInput.focus();
            }
        }
        
        // Send on Enter key
        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });
        
        // Load personas when page loads
        loadPersonas();
        
        // Focus input on load
        messageInput.focus();
    </script>
</body>
</html>
