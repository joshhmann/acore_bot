<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestalt Operator</title>
    <link rel="stylesheet" href="/static/css/styles.css">
</head>
<body>
    <div id="runtime-bootstrap" hidden aria-hidden="true">
        <span>Cache Model</span>
        <span>Saved Tokens</span>
        <span>Pending Approvals</span>
    </div>
    <script>
        function applyApproval(id) {
            if (window.approvalsView && typeof window.approvalsView.applyApproval === 'function') {
                return window.approvalsView.applyApproval(id);
            }
            return null;
        }

        function rejectApproval(id) {
            if (window.approvalsView && typeof window.approvalsView.rejectApproval === 'function') {
                return window.approvalsView.rejectApproval(id);
            }
            return null;
        }

        function refreshRuntimePanel() {
            window.dispatchEvent(new CustomEvent('gestalt:refresh-runtime-panel'));
        }
    </script>
    <script type="module" src="/static/js/app.js"></script>
</body>
</html>
