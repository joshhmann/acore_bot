name: CI

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality Gates
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install uv
      uses: astral-sh/setup-uv@v5
      with:
        version: "latest"
        enable-cache: true

    - name: Set up Python
      run: uv python install 3.12

    - name: Install dependencies
      run: uv sync

    - name: Ruff
      run: uv run ruff check . --output-format=github

    - name: Docs Governance
      run: uv run python scripts/check_docs_governance.py

  unit-maintained:
    name: Unit Tests (Maintained Runtime Surfaces)
    runs-on: ubuntu-latest
    needs: quality

    steps:
    - uses: actions/checkout@v4

    - name: Install uv
      uses: astral-sh/setup-uv@v5
      with:
        version: "latest"
        enable-cache: true

    - name: Set up Python
      run: uv python install 3.12

    - name: Install dependencies
      run: uv sync

    - name: Run maintained unit suite
      run: |
        uv run pytest \
          tests/unit/test_gestalt_v1_runtime.py \
          tests/unit/test_runtime_stdio.py \
          tests/unit/test_web_runtime_api.py \
          tests/unit/core/test_adapter_contract.py \
          tests/unit/test_cli_productization.py \
          tests/unit/test_discord_chat_runtime_path.py \
          -q --tb=short

    - name: Upload pytest cache
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: pytest-cache
        path: .pytest_cache/
